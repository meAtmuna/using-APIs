<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="background">
        <div class="top">
            <div id="date" class="gloss"></div>
        </div>

        <div class="main">
            <div class="left">
                <div class="gloss">
                    <p id="time">00:00:00</p>
                    <p id="weather">0°C 0 km/h</p>
                </div>
            </div>

            <div class="right">
                <div class="gloss">
                    <h1>Quote Of The Day:</h1>
                    <p id="quote"></p>
                </div>
            </div>
        </div>   
    </div>

    <script src="script.js"></script>
</body>
</html>
